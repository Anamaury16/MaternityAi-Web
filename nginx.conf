server {
    listen 80;
    server_name localhost;

    # Ocultar la versión de Nginx en las cabeceras de respuesta para seguridad
    server_tokens off;

    # Compresión Gzip para mejorar rendimiento de transferencia de red
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.code
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Directorio de los archivos construidos
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Configuración principal para el SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;

        # Cabeceras de Seguridad
        # 1. Prevenir que la app sea enmarcada (Clickjacking)
        add_header X-Frame-Options "DENY" always;

        # 2. Deshabilitar detección automática de tipo MIME (MIME-Sniffing)
        add_header X-Content-Type-Options "nosniff" always;

        # 3. Controlar la información de referencia enviada en peticiones
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 4. Strict Transport Security (HSTS) - Forzar HTTPS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # 5. Content Security Policy (CSP) - Mitigar ataques XSS y de inyección
        # Permite conexiones al mismo origen, localhost (desarrollo), y cualquier URL segura (https)
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none';" always;

        # 6. Permissions Policy - Restringir APIs del navegador innecesarias
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    }

    # Cachar estáticos eficientemente (Vite usa hashes en nombres de archivo)
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        
        # También aplicamos cabeceras básicas de seguridad a estáticos
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Opcional: Proxy inverso para redireccionar peticiones a la API del backend
    # location /api/ {
    #     proxy_pass http://backend:8000/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
